# Container configuration. Host-side port publishing remains loopback-only by default.
bind=0.0.0.0
port=6379
shard_threads=4
max_clients=10000
max_request_bytes=16mb
max_output_bytes=64mb
maxmemory=512mb
eviction_policy=lru
log_level=info
log_file=
appendonly=false
appendfilename=cachefly.aof
appendfsync=everysec
snapshot=false
snapshotfilename=cachefly.snapshot
admin_port=8080
